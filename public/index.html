<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Proofreader</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#ffffff;--surface:#f4f4f4;--surface2:#ebebeb;--border:#e0e0e0;
      --text:#0d0d0d;--text-muted:#8a8a8a;--text-secondary:#555;
      --user-bg:#1a1a1a;--user-text:#ffffff;--bot-bg:#f4f4f4;--bot-text:#1a1a1a;--bot-border:#ebebeb;
      --input-bg:#f4f4f4;--input-border:#e0e0e0;--input-focus:#0d0d0d;
      --send-bg:#0d0d0d;--send-text:#fff;--chip-active-bg:#0d0d0d;--chip-active-text:#fff;
      --settings-bg:#f9f9f9;--scrollbar:#ddd;--danger:#ef4444;--success:#22c55e;
    }
    [data-theme="dark"] {
      --bg:#0d0d0d;--surface:#1a1a1a;--surface2:#242424;--border:#2a2a2a;
      --text:#f0f0f0;--text-muted:#555;--text-secondary:#999;
      --user-bg:#2d2d2d;--user-text:#f5f5f5;--bot-bg:#1a1a1a;--bot-text:#ebebeb;--bot-border:#2a2a2a;
      --input-bg:#1a1a1a;--input-border:#2a2a2a;--input-focus:#f0f0f0;
      --send-bg:#f0f0f0;--send-text:#0d0d0d;--chip-active-bg:#f0f0f0;--chip-active-text:#0d0d0d;
      --settings-bg:#141414;--scrollbar:#2a2a2a;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Geist',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;}
    .app{display:flex;flex-direction:column;height:100dvh;max-width:760px;margin:0 auto;background:var(--bg);}
    .header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;}
    .header-left{display:flex;align-items:center;gap:10px;}
    .header-logo{width:28px;height:28px;border-radius:8px;background:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .header-logo svg{color:var(--bg);}
    .header-title{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
    .header-right{display:flex;align-items:center;gap:6px;}
    .icon-btn{background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text-muted);transition:color 0.15s,background 0.15s;}
    .icon-btn:hover{color:var(--text);background:var(--surface);}
    .icon-btn.active{color:var(--text);background:var(--surface2);}
    .settings-panel{background:var(--settings-bg);border-bottom:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height 0.25s ease,padding 0.25s ease;flex-shrink:0;}
    .settings-panel.open{max-height:220px;padding:14px 20px;}
    .settings-grid{display:flex;flex-direction:column;gap:10px;}
    .settings-row{display:flex;align-items:center;gap:10px;}
    .settings-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;width:90px;flex-shrink:0;}
    .chip-group{display:flex;gap:5px;flex-wrap:wrap;}
    .chip{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);font-family:inherit;transition:all 0.12s;outline:none;}
    .chip:hover{border-color:var(--text-muted);}
    .chip.active{background:var(--chip-active-bg);color:var(--chip-active-text);border-color:var(--chip-active-bg);}
    .chat-area{flex:1;overflow-y:auto;padding:20px 20px 8px;display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth;scrollbar-gutter:stable;}
    .chat-area::-webkit-scrollbar{width:6px;}
    .chat-area::-webkit-scrollbar-track{background:transparent;}
    .chat-area::-webkit-scrollbar-thumb{background:transparent;border-radius:10px;}
    .chat-area:hover::-webkit-scrollbar-thumb{background:var(--scrollbar);}
    .chat-area::-webkit-scrollbar-thumb:active{background:var(--text-muted);}
    /* pin scrollbar to right edge of viewport */
    @media (min-width: 760px) {
      .chat-area{overflow-y:scroll;margin-right:calc(-1 * (100vw - 760px) / 2);padding-right:calc(20px + (100vw - 760px) / 2);}
    }
    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-muted);text-align:center;padding-bottom:60px;pointer-events:none;}
    .empty-icon{width:44px;height:44px;border-radius:14px;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--text-muted);}
    .empty-title{font-size:15px;font-weight:500;color:var(--text-secondary);}
    .empty-sub{font-size:13px;}
    .msg-pair{display:flex;flex-direction:column;gap:8px;}
    .msg-wrap{display:flex;flex-direction:column;gap:3px;animation:fadeUp 0.2s ease;}
    .msg-wrap.user{align-items:flex-end;}
    .msg-wrap.bot{align-items:flex-start;}
    .msg-bubble{max-width:78%;padding:11px 15px;font-size:14.5px;line-height:1.6;word-break:break-word;white-space:pre-wrap;}
    .msg-bubble.user{background:var(--user-bg);color:var(--user-text);border-radius:18px 18px 4px 18px;}
    .msg-bubble.bot{background:var(--bot-bg);color:var(--bot-text);border:1px solid var(--bot-border);border-radius:18px 18px 18px 4px;}
    .msg-bubble.loading{display:flex;align-items:center;gap:5px;padding:14px 16px;}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:bounce 1.2s infinite;}
    .dot:nth-child(2){animation-delay:0.15s;}
    .dot:nth-child(3){animation-delay:0.3s;}
    @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-5px);opacity:1;}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .msg-footer{display:flex;align-items:center;gap:4px;padding:0 4px;}
    .msg-footer.user{flex-direction:row-reverse;}
    .msg-time{font-size:11px;color:var(--text-muted);}
    .msg-action{background:none;border:none;cursor:pointer;padding:3px 5px;display:flex;align-items:center;gap:3px;border-radius:5px;color:var(--text-muted);font-size:11px;font-family:inherit;opacity:0;transition:opacity 0.15s,color 0.12s;}
    .msg-pair:hover .msg-action{opacity:1;}
    .msg-action:hover{color:var(--text);}
    .msg-action.copied{color:var(--success)!important;opacity:1;}
    .date-divider{display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:11px;}
    .date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .input-area{padding:12px 16px 16px;flex-shrink:0;border-top:1px solid var(--border);}
    .file-badge-wrap{margin-bottom:8px;}
    .file-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-secondary);font-weight:500;}
    .file-badge-remove{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0 0 0 2px;font-size:15px;line-height:1;display:flex;align-items:center;}
    .file-badge-remove:hover{color:var(--danger);}
    .input-box{display:flex;align-items:flex-start;gap:8px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:14px;padding:12px 12px 12px 16px;transition:border-color 0.15s;}
    .input-box:focus-within{border-color:var(--input-focus);}
    .input-left{flex:1;display:flex;align-items:flex-start;}
    .input-tools{display:flex;align-items:center;gap:4px;flex-shrink:0;padding-top:2px;}
    textarea#input-text{flex:1;background:none;border:none;outline:none;resize:none;font-family:inherit;font-size:14.5px;line-height:1.55;color:var(--text);min-height:72px;max-height:200px;overflow-y:auto;padding:0;display:block;}
    textarea#input-text::placeholder{color:var(--text-muted);}
    textarea::-webkit-scrollbar{width:3px;}
    textarea::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px;}
    .input-tools{display:flex;align-items:center;gap:4px;flex-shrink:0;}
    .tool-btn{background:none;border:none;cursor:pointer;padding:5px;border-radius:7px;color:var(--text-muted);display:flex;align-items:center;transition:color 0.12s,background 0.12s;}
    .tool-btn:hover{color:var(--text);background:var(--surface2);}
    .tool-btn label{cursor:pointer;display:flex;align-items:center;}
    .send-btn{width:34px;height:34px;border-radius:9px;background:var(--send-bg);color:var(--send-text);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity 0.15s,transform 0.1s;flex-shrink:0;}
    .send-btn:disabled{opacity:0.25;cursor:not-allowed;}
    .send-btn:not(:disabled):hover{opacity:0.85;}
    .send-btn:not(:disabled):active{transform:scale(0.93);}
    .input-hint{text-align:center;font-size:11px;color:var(--text-muted);margin-top:8px;}
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="header-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <span class="header-title" id="t-title">Proofreader</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="settings-toggle" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="icon-btn" id="theme-toggle" title="Toggle theme">
        <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="settings-panel" id="settings-panel">
    <div class="settings-grid">
      <div class="settings-row"><span class="settings-label" id="t-lang-label">Language</span><div class="chip-group" id="lang-group"></div></div>
      <div class="settings-row"><span class="settings-label" id="t-level-label">Level</span><div class="chip-group" id="level-group"></div></div>
      <div class="settings-row"><span class="settings-label" id="t-tone-label">Tone</span><div class="chip-group" id="tone-group"></div></div>
      <div class="settings-row"><span class="settings-label" id="t-context-label">Context</span><div class="chip-group" id="context-group"></div></div>
    </div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <div class="empty-title" id="t-empty-title">Paste text to proofread</div>
      <div class="empty-sub" id="t-empty-sub">Supports English, Russian, Ukrainian</div>
    </div>
  </div>

  <div class="input-area">
    <div class="file-badge-wrap" id="file-badge-wrap" style="display:none"></div>
    <div class="input-box">
      <div class="input-left">
        <textarea id="input-text" rows="1" placeholder="Type or paste text…"></textarea>
      </div>
      <div class="input-tools">
        <div class="tool-btn" title="Upload .docx or .pdf">
          <label>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <input type="file" accept=".docx,.pdf" id="file-input" style="display:none">
          </label>
        </div>
        <button class="send-btn" id="send-btn" disabled title="Send">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </div>
    <div class="input-hint" id="t-hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.2.4/build/index.umd.min.js"></script>
<script>
  if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const LANGUAGES=[{code:'auto',label:'✨ Auto'},{code:'en',label:'🇬🇧 English'},{code:'ru',label:'🇷🇺 Русский'},{code:'uk',label:'🇺🇦 Українська'}];
  const TONE_EN=['Formal','Neutral','Casual','Friendly'];
  const LEVEL_EN=['Simple','Standard','Advanced'];
  const HISTORY_KEY='pr_history';
  const MAX_HISTORY=30;

  function detectLang(text){
    const ukChars=(text.match(/[іїєґ]/gi)||[]).length;
    if(ukChars>0)return'uk';
    const cyrillic=(text.match(/[а-яёА-ЯЁ]/g)||[]).length;
    if(cyrillic>text.length*0.25)return'ru';
    return'en';
  }
  const CONTEXT_OPTIONS={
    en:[{val:'',label:'None'},{val:'Email',label:'Email'},{val:'LinkedIn Post',label:'LinkedIn'},{val:'Press Release',label:'Press release'},{val:'Contract',label:'Contract'},{val:'Social Post',label:'Social'}],
    ru:[{val:'',label:'Нет'},{val:'Email',label:'Письмо'},{val:'LinkedIn Post',label:'LinkedIn'},{val:'Press Release',label:'Пресс-релиз'},{val:'Contract',label:'Договор'},{val:'Social Post',label:'Соцсети'}],
    uk:[{val:'',label:'Немає'},{val:'Email',label:'Лист'},{val:'LinkedIn Post',label:'LinkedIn'},{val:'Press Release',label:'Прес-реліз'},{val:'Contract',label:'Договір'},{val:'Social Post',label:'Соцмережі'}],
  };
  const UI={
    en:{title:'Proofreader',inputPlaceholder:'Type or paste text…',hint:'Enter to send · Shift+Enter for new line',emptyTitle:'Paste text to proofread',emptySub:'Supports English, Russian, Ukrainian',tones:['Formal','Neutral','Casual','Friendly'],levels:['Simple','Standard','Advanced'],lang:'Language',level:'Level',tone:'Tone',context:'Context'},
    ru:{title:'Пруфридер',inputPlaceholder:'Введите или вставьте текст…',hint:'Enter — отправить · Shift+Enter — новая строка',emptyTitle:'Вставьте текст для проверки',emptySub:'Поддерживает русский, украинский, английский',tones:['Официальный','Нейтральный','Непринуждённый','Дружелюбный'],levels:['Простой','Стандартный','Продвинутый'],lang:'Язык',level:'Уровень',tone:'Тон',context:'Контекст'},
    uk:{title:'Пруфрідер',inputPlaceholder:'Введіть або вставте текст…',hint:'Enter — надіслати · Shift+Enter — новий рядок',emptyTitle:'Вставте текст для перевірки',emptySub:'Підтримує українську, англійську, російську',tones:['Офіційний','Нейтральний','Невимушений','Дружній'],levels:['Простий','Стандартний','Просунутий'],lang:'Мова',level:'Рівень',tone:'Тон',context:'Контекст'},
  };
  const SYSTEM_PROMPT={
    auto:(tone,level,ctx)=>`You are a professional proofreader. Detect the language of the text and proofread it in that same language.${ctx?` Document type: ${ctx}.`:''} Tone: ${tone}. Language level: ${level}. Return ONLY the corrected text in the same language as the input, no explanations.`,
    en:(tone,level,ctx)=>`You are a professional proofreader. Proofread and correct the user's text.${ctx?` Document type: ${ctx}.`:''} Tone: ${tone}. Language level: ${level}. Return ONLY the corrected text in English, no explanations.`,
    ru:(tone,level,ctx)=>`Ты профессиональный корректор. Проверь и исправь текст.${ctx?` Тип документа: ${ctx}.`:''} Тон: ${tone}. Уровень: ${level}. Верни ТОЛЬКО исправленный текст на русском, без объяснений.`,
    uk:(tone,level,ctx)=>`Ти професійний коректор. Перевір та виправ текст.${ctx?` Тип документа: ${ctx}.`:''} Тон: ${tone}. Рівень: ${level}. Поверни ЛИШЕ виправлений текст українською, без пояснень.`,
  };

  // Theme
  const prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  let theme=localStorage.getItem('pr_theme')||(prefersDark?'dark':'light');
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme',t);
    const icon=document.getElementById('theme-icon');
    if(t==='dark'){icon.innerHTML=`<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;}
    else{icon.innerHTML=`<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;}
  }
  applyTheme(theme);
  document.getElementById('theme-toggle').addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';localStorage.setItem('pr_theme',theme);applyTheme(theme);});

  // State
  let state={lang:localStorage.getItem('pr_lang')||'auto',toneIdx:parseInt(localStorage.getItem('pr_tone'))||1,levelIdx:parseInt(localStorage.getItem('pr_level'))||1,contextVal:localStorage.getItem('pr_ctx')||'',loading:false};
  let uploadedFileName=null,uploadedFileType=null,settingsOpen=false;
  const isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  const els={
    chatArea:document.getElementById('chat-area'),
    emptyState:document.getElementById('empty-state'),
    input:document.getElementById('input-text'),
    sendBtn:document.getElementById('send-btn'),
    fileInput:document.getElementById('file-input'),
    fileBadgeWrap:document.getElementById('file-badge-wrap'),
    settingsPanel:document.getElementById('settings-panel'),
    settingsToggle:document.getElementById('settings-toggle'),
  };

  // History
  function loadHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[];}catch{return[];}}
  function saveToHistory(input,output,lang,toneIdx,levelIdx,contextVal,fileName){
    let h=loadHistory();
    h.unshift({input,output,lang,toneIdx,levelIdx,contextVal,fileName:fileName||null,ts:Date.now()});
    localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(0,MAX_HISTORY)));
  }
  function formatTime(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
  function formatDate(ts){const d=new Date(ts),now=new Date(),diff=Math.floor((now-d)/86400000);if(diff===0)return'Today';if(diff===1)return'Yesterday';return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});}

  // Chips
  function renderChips(){
    const uiLang=state.lang==='auto'?'en':state.lang;
    const t=UI[uiLang];
    document.getElementById('t-lang-label').innerText=t.lang;
    document.getElementById('t-level-label').innerText=t.level;
    document.getElementById('t-tone-label').innerText=t.tone;
    document.getElementById('t-context-label').innerText=t.context;
    document.getElementById('lang-group').innerHTML=LANGUAGES.map(l=>`<button class="chip ${state.lang===l.code?'active':''}" data-type="lang" data-val="${l.code}">${l.label}</button>`).join('');
    document.getElementById('level-group').innerHTML=t.levels.map((lvl,i)=>`<button class="chip ${state.levelIdx===i?'active':''}" data-type="level" data-val="${i}">${lvl}</button>`).join('');
    document.getElementById('tone-group').innerHTML=t.tones.map((tn,i)=>`<button class="chip ${state.toneIdx===i?'active':''}" data-type="tone" data-val="${i}">${tn}</button>`).join('');
    document.getElementById('context-group').innerHTML=CONTEXT_OPTIONS[uiLang].map(o=>`<button class="chip ${state.contextVal===o.val?'active':''}" data-type="ctx" data-val="${o.val}">${o.label}</button>`).join('');
  }
  function renderUI(){
    const uiLang=state.lang==='auto'?'en':state.lang;
    const t=UI[uiLang];
    document.getElementById('t-title').innerText=t.title;
    document.getElementById('t-hint').innerText=isMobile?'Ctrl+Enter to send':t.hint;
    document.getElementById('t-empty-title').innerText=t.emptyTitle;
    document.getElementById('t-empty-sub').innerText=t.emptySub;
    els.input.placeholder=t.inputPlaceholder;
    renderChips();
  }

  // Settings
  els.settingsToggle.addEventListener('click',()=>{settingsOpen=!settingsOpen;els.settingsPanel.classList.toggle('open',settingsOpen);els.settingsToggle.classList.toggle('active',settingsOpen);});
  document.addEventListener('click',e=>{
    if(!e.target.classList.contains('chip'))return;
    const type=e.target.getAttribute('data-type'),val=e.target.getAttribute('data-val');
    if(type==='lang'){state.lang=val;localStorage.setItem('pr_lang',val);}
    if(type==='level'){state.levelIdx=parseInt(val);localStorage.setItem('pr_level',val);}
    if(type==='tone'){state.toneIdx=parseInt(val);localStorage.setItem('pr_tone',val);}
    if(type==='ctx'){state.contextVal=val;localStorage.setItem('pr_ctx',val);}
    renderChips();
  });

  // File upload
  els.fileInput.addEventListener('change',async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const ab=await file.arrayBuffer();let text='';
      if(file.name.toLowerCase().endsWith('.pdf')){
        uploadedFileType='pdf';
        const pdf=await pdfjsLib.getDocument({data:ab}).promise;
        for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const c=await page.getTextContent();text+=c.items.map(x=>x.str).join(' ')+'\n';}
      }else{uploadedFileType='docx';const r=await mammoth.extractRawText({arrayBuffer:ab});text=r.value;}
      uploadedFileName=file.name;els.input.value=text.trim();autoResize(els.input);els.sendBtn.disabled=!els.input.value.trim();renderFileBadge();
    }catch(err){alert('Could not read file: '+err.message);}
    e.target.value='';
  });
  function renderFileBadge(){
    if(uploadedFileName){
      els.fileBadgeWrap.style.display='block';
      els.fileBadgeWrap.innerHTML=`<div class="file-badge"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1" width="12" height="14" rx="2"/><path d="M5 5h6M5 8h6M5 11h4"/></svg>${uploadedFileName}<button class="file-badge-remove" id="remove-file">×</button></div>`;
      document.getElementById('remove-file').addEventListener('click',()=>{uploadedFileName=null;uploadedFileType=null;els.input.value='';autoResize(els.input);els.sendBtn.disabled=true;els.fileBadgeWrap.style.display='none';});
    }else{els.fileBadgeWrap.style.display='none';}
  }

  // Chat rendering
  function escHtml(str){return(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function scrollToBottom(smooth=true){els.chatArea.scrollTo({top:els.chatArea.scrollHeight,behavior:smooth?'smooth':'instant'});}

  function renderChatHistory(){
    document.querySelectorAll('.msg-pair,.date-divider').forEach(el=>el.remove());
    const h=loadHistory();
    if(!h.length){els.emptyState.style.display='flex';return;}
    els.emptyState.style.display='none';
    let lastDate=null;
    [...h].reverse().forEach(item=>{
      const dLabel=formatDate(item.ts);
      if(dLabel!==lastDate){const div=document.createElement('div');div.className='date-divider';div.textContent=dLabel;els.chatArea.appendChild(div);lastDate=dLabel;}
      appendMsgPair(item.input,item.output,item.ts,item.lang,item.fileName,false);
    });
    scrollToBottom(false);
  }

  function appendMsgPair(input,output,ts,lang,fileName,animate=true){
    els.emptyState.style.display='none';
    const t=formatTime(ts);
    const pair=document.createElement('div');
    pair.className='msg-pair';
    pair.innerHTML=`
      <div class="msg-wrap user">
        <div class="msg-bubble user">${escHtml(input)}</div>
        <div class="msg-footer user">
          <span class="msg-time">${t}</span>
          <button class="msg-action" data-copy="${encodeURIComponent(input)}" title="Copy">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="1" width="9" height="11" rx="1.5"/><path d="M2 5h0a1.5 1.5 0 0 0-1.5 1.5v8A1.5 1.5 0 0 0 2 16h6a1.5 1.5 0 0 0 1.5-1.5v0"/></svg>
          </button>
        </div>
      </div>
      <div class="msg-wrap bot">
        <div class="msg-bubble bot">${escHtml(output)}</div>
        <div class="msg-footer">
          <span class="msg-time">${t}</span>
          ${fileName?`<button class="msg-action" data-download="${encodeURIComponent(output)}" data-filename="${encodeURIComponent(fileName)}" title="Download .docx"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 8l3 3 3-3"/><path d="M3 13h10"/></svg></button>`:''}
          <button class="msg-action" data-copy="${encodeURIComponent(output)}" title="Copy result">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="1" width="9" height="11" rx="1.5"/><path d="M2 5h0a1.5 1.5 0 0 0-1.5 1.5v8A1.5 1.5 0 0 0 2 16h6a1.5 1.5 0 0 0 1.5-1.5v0"/></svg>
          </button>
        </div>
      </div>`;
    els.chatArea.appendChild(pair);
    if(animate)scrollToBottom(true);
  }

  function appendLoadingBubble(){
    els.emptyState.style.display='none';
    const wrap=document.createElement('div');
    wrap.className='msg-wrap bot';wrap.id='loading-bubble';
    wrap.innerHTML=`<div class="msg-bubble bot loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    els.chatArea.appendChild(wrap);scrollToBottom(true);
    return wrap;
  }

  // Input
  function autoResize(el){el.style.height='auto';el.style.height=Math.min(Math.max(el.scrollHeight,72),200)+'px';}
  els.input.addEventListener('input',()=>{autoResize(els.input);els.sendBtn.disabled=state.loading||!els.input.value.trim();});
  els.input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      if(isMobile){if(e.ctrlKey||e.metaKey){e.preventDefault();handleProofread();}}
      else{if(!e.shiftKey){e.preventDefault();handleProofread();}}
    }
  });
  els.sendBtn.addEventListener('click',handleProofread);

  // Proofread
  async function handleProofread(){
    const text=els.input.value.trim();
    if(!text||state.loading)return;
    state.loading=true;els.sendBtn.disabled=true;
    const inputText=text,fname=uploadedFileName;
    const effectiveLang=state.lang==='auto'?detectLang(inputText):state.lang;
    const promptText=`${SYSTEM_PROMPT[state.lang](TONE_EN[state.toneIdx],LEVEL_EN[state.levelIdx],state.contextVal)}\n\nOriginal text:\n${inputText}`;
    els.input.value='';autoResize(els.input);
    uploadedFileName=null;uploadedFileType=null;renderFileBadge();
    const loadingEl=appendLoadingBubble();
    try{
      const res=await fetch('/api/proofread',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:promptText,lang:effectiveLang})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||'Server error');
      loadingEl.remove();
      const ts=Date.now();
      appendMsgPair(inputText,data.result,ts,effectiveLang,fname);
      saveToHistory(inputText,data.result,effectiveLang,state.toneIdx,state.levelIdx,state.contextVal,fname);
    }catch(err){
      loadingEl.remove();
      const errWrap=document.createElement('div');errWrap.className='msg-wrap bot';
      errWrap.innerHTML=`<div class="msg-bubble bot" style="color:var(--danger)">Error: ${escHtml(err.message)}</div>`;
      els.chatArea.appendChild(errWrap);scrollToBottom(true);
    }finally{state.loading=false;els.sendBtn.disabled=!els.input.value.trim();}
  }

  // Copy / download
  els.chatArea.addEventListener('click',async e=>{
    const copyBtn=e.target.closest('[data-copy]');
    if(copyBtn){
      const text=decodeURIComponent(copyBtn.getAttribute('data-copy'));
      navigator.clipboard.writeText(text);
      copyBtn.classList.add('copied');
      const orig=copyBtn.innerHTML;
      copyBtn.innerHTML=`<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,8 6,12 14,4" fill="none"/></svg>`;
      setTimeout(()=>{copyBtn.classList.remove('copied');copyBtn.innerHTML=orig;},1500);
      return;
    }
    const dlBtn=e.target.closest('[data-download]');
    if(dlBtn&&window.docx){
      const text=decodeURIComponent(dlBtn.getAttribute('data-download'));
      const fileName=decodeURIComponent(dlBtn.getAttribute('data-filename'));
      const{Document,Paragraph,TextRun,Packer}=window.docx;
      const paragraphs=text.split('\n').map(l=>new Paragraph({children:[new TextRun(l)]}));
      const doc=new Document({sections:[{children:paragraphs}]});
      const blob=await Packer.toBlob(doc);const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=fileName.replace(/\.(docx|pdf)$/i,'_proofread.docx');a.click();URL.revokeObjectURL(url);
    }
  });

  // Init
  renderUI();
  renderChatHistory();
</script>
</body>
</html>
